<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1939 CAN Simulator - Siga Sul Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col p-6 font-sans">

    <header class="mb-8 border-b border-gray-700 pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-bold text-blue-400">J1939 CAN Simulator</h1>
            <p class="text-gray-400">Virloc 8 Telemetry Lab</p>
        </div>
        <div class="flex items-center gap-2">
            <span id="ws-status" class="h-3 w-3 rounded-full bg-red-500"></span>
            <span class="text-sm text-gray-400">Status Conexão</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Controles do Veículo</h2>
            
            <label class="block mb-2 text-sm text-gray-300">Perfil de Rede CAN:</label>
            <select id="profile" class="w-full bg-gray-700 text-white p-2 rounded mb-6 outline-none focus:ring-2 focus:ring-blue-500">
                <option value="standard">Padrão J1939 (Scania/Genérico)</option>
                <option value="volvo">Volvo FMX500 Custom</option>
            </select>

            <div class="mb-4">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="ignition" class="form-checkbox h-5 w-5 text-blue-500 rounded focus:ring-0 bg-gray-700 border-gray-600">
                    <span class="text-lg font-medium">Ignição Ligada</span>
                </label>
            </div>
            <div class="mb-6">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="clutch" class="form-checkbox h-5 w-5 text-blue-500 rounded focus:ring-0 bg-gray-700 border-gray-600">
                    <span class="text-lg font-medium">Embreagem Pressionada</span>
                </label>
            </div>

            <div class="mb-6">
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Acelerador (Pedal)</label>
                    <span id="pedal-val" class="text-sm text-blue-400 font-bold">0%</span>
                </div>
                <input type="range" id="pedal" min="0" max="100" value="0" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="mb-6">
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Rotação (RPM)</label>
                    <span id="rpm-val" class="text-sm text-green-400 font-bold">0 RPM</span>
                </div>
                <input type="range" id="rpm" min="0" max="3000" value="0" step="50" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="mb-2">
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Velocidade (km/h)</label>
                    <span id="speed-val" class="text-sm text-yellow-400 font-bold">0 km/h</span>
                </div>
                <input type="range" id="speed" min="0" max="140" value="0" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <div class="col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col items-center justify-center gap-8">
            <div class="relative w-full max-w-[200px]">
                <canvas id="rpmGauge"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pt-10">
                    <span id="gauge-rpm-txt" class="text-2xl font-bold">0</span>
                    <span class="text-xs text-gray-400">RPM</span>
                </div>
            </div>
            
            <div class="relative w-full max-w-[200px]">
                <canvas id="speedGauge"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pt-10">
                    <span id="gauge-speed-txt" class="text-2xl font-bold">0</span>
                    <span class="text-xs text-gray-400">km/h</span>
                </div>
            </div>
        </div>

        <div class="col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Console (Barramento CAN)</h2>
            <div id="log" class="flex-1 bg-black text-green-400 p-4 rounded overflow-y-auto font-mono text-xs space-y-1 max-h-[400px]">
                <div>Sistema Iniciado. Aguardando Ignição...</div>
            </div>
        </div>
    </div>

    <script>
        // Configuração dos Gráficos (Gauges)
        const gaugeOptions = {
            rotation: 270,
            circumference: 180,
            cutout: '80%',
            plugins: { tooltip: { enabled: false }, legend: { display: false } },
            animation: { duration: 0 }
        };

        const rpmCtx = document.getElementById('rpmGauge').getContext('2d');
        const rpmChart = new Chart(rpmCtx, {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 3000], backgroundColor: ['#4ade80', '#374151'], borderWidth: 0 }] },
            options: gaugeOptions
        });

        const speedCtx = document.getElementById('speedGauge').getContext('2d');
        const speedChart = new Chart(speedCtx, {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 140], backgroundColor: ['#facc15', '#374151'], borderWidth: 0 }] },
            options: gaugeOptions
        });

        // Lógica do WebSocket
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const statusIndicator = document.getElementById('ws-status');
        const logWindow = document.getElementById('log');

        ws.onopen = () => {
            statusIndicator.classList.replace('bg-red-500', 'bg-green-500');
            sendState(); // Envia o estado inicial
        };

        ws.onclose = () => {
            statusIndicator.classList.replace('bg-green-500', 'bg-red-500');
        };

        ws.onmessage = (event) => {
            const logs = event.data.split('\n');
            logs.forEach(msg => {
                const div = document.createElement('div');
                div.textContent = `[TX] ${msg}`;
                logWindow.appendChild(div);
            });
            // Mantém o scroll sempre no final
            if (logWindow.childElementCount > 100) logWindow.removeChild(logWindow.firstChild);
            logWindow.scrollTop = logWindow.scrollHeight;
        };

        // Captura e Envio de Estado
        const inputs = ['profile', 'rpm', 'speed', 'pedal', 'ignition', 'clutch'];
        
        function sendState() {
            if (ws.readyState !== WebSocket.OPEN) return;
            const state = {
                profile: document.getElementById('profile').value,
                rpm: document.getElementById('rpm').value,
                speed: document.getElementById('speed').value,
                pedal: document.getElementById('pedal').value,
                ignition: document.getElementById('ignition').checked,
                clutch: document.getElementById('clutch').checked
            };
            ws.send(JSON.stringify(state));
        }

        // Atualiza a UI e emite para o Python
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                if(id === 'rpm') {
                    document.getElementById('rpm-val').innerText = e.target.value + ' RPM';
                    document.getElementById('gauge-rpm-txt').innerText = e.target.value;
                    rpmChart.data.datasets[0].data = [e.target.value, 3000 - e.target.value];
                    rpmChart.update();
                }
                if(id === 'speed') {
                    document.getElementById('speed-val').innerText = e.target.value + ' km/h';
                    document.getElementById('gauge-speed-txt').innerText = e.target.value;
                    speedChart.data.datasets[0].data = [e.target.value, 140 - e.target.value];
                    speedChart.update();
                }
                if(id === 'pedal') {
                    document.getElementById('pedal-val').innerText = e.target.value + '%';
                }
                sendState();
            });
        });
    </script>
</body>
</html>
